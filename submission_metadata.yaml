methodology_summary: >
  Multi-stage ranking pipeline: (1) evidence extraction from all 100K profiles
  scanning for AI/ML keywords, production experience, evaluation frameworks,
  and career highlights; (2) 20-feature technical scoring with penalties for
  honeypots, job-hopping, consulting-only careers, and keyword stuffing;
  (3) dual-lane retrieval (2K AI-skills + 2K production-experience) yielding
  ~2300 unique candidates; (4) semantic reranking using sentence-transformers
  (all-MiniLM-L6-v2) against the JD; (5) behavioral scoring from 9 Redrob
  signals (response rate, GitHub, availability, demand, response time,
  recruiter saves, profile completeness, interview rate, applications)
  with a fixed reference date for reproducibility; (6) location, education,
  work mode, salary, and pre-LLM experience features; (7) final aggregation
  with hard filters (penalties >= 0.50 drop candidates) and deterministic
  tiebreakers (score, response rate, YoE, GitHub, candidate ID ascending);
  (8) structurally varied reasoning generation using 9 templates (3 per
  rank tier) with different sentence structures, not just word swaps.
